<main class="w-full h-full flex flex-col gap-5 pt-20 items-center text-black/80 bg-gray-200">
  <h1 class="text-gray-400 text-8xl font-bold drop-shadow-md">To-Do List</h1>
  <p class="text-white bg-red-400 px-5 py-2 rounded-xl border-4">
    Ingrese su usuario y presione enter, si no tiene uno, se creara automaticamente!!
  </p>
  <section class="mb-10">
    <input
      type="text"
      placeholder="username"
      (keyup.enter)="onSearch(txtUser.value)"
      #txtUser
      class="bg-white rounded px-2 py-1"
    />
  </section>

  <span class="text-3xl text-black/30">{{
    todoService.currentUser().length > 0 ? `Hi, ${txtUser.value}` : ''
  }}</span>
  <section class="w-150 bg-white px-7 pb-3 mt-7 rounded-xs shadow-2xl">
    <app-todo-input />
    <app-todo-list />
    <p class="py-1">
      {{
        todoService.tasks().length === 0
          ? 'You have no tasks, please add'
          : todoService.tasks().length + ' ítems'
      }}
    </p>
  </section>
</main>

<router-outlet />
